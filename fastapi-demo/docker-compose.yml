services:
  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      USER_SERVICE_PORT: "8001"

  order-service:
    build: ./services/order-service
    ports:
      - "8002:8002"
    environment:
      ORDER_SERVICE_PORT: "8002"
      USER_SERVICE_URL: http://user-service:8001
    depends_on:
      - user-service

  a-service:
    build: ./services/a
    ports:
      - "8003:8003"
    environment:
      A_SERVICE_PORT: "8003"
